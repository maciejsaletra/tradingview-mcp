<!--
COMMERCIAL SIGNAL CARD — Variant A. APPROVED by Magic 2026-07-05 (group-approval mockup, XAUUSD/SOLUSDT test cards).
This is the canonical, locked layout for every commercial/marketing signal card going forward — do not redesign without explicit approval.
Companion doc: context/project_assets.md ("COMMERCIAL SIGNAL CARD STYLE – GUIDE"). Operational (non-branded) screenshot standard stays separate — see ROUTINES_V2.md §11.

USAGE — fill placeholders then render:
  node src/cli/index.js card render --html "<filled-copy-of-this-file>.html" --out "<out>.png" --width 800

PLACEHOLDERS:
  <LOGO_BASE64>     assets/trw_logo.jpg as base64 (no line breaks) — full resolution, not the mockup's downscaled preview
  <TICKER>          e.g. "SOLUSDT", "XAUUSD"
  <SUBTITLE>        one short line, e.g. "Bullish OB retest · pullback into 0.618"
  <DIRECTION>       "BUY" or "SELL"
  <DIR_BG>/<DIR_TEXT>  BUY: #173404 / #97c459 — SELL: #3a0f0f / #f0997b
  <SESSION_LABEL>   e.g. "Weekend Crypto · Sat 20:00 UK", "London 08:30 UK"
  <DATE>            e.g. "2026-07-05"
  <CHART_IMG_PATH>  path to the ACTUAL clean chart screenshot (SCREENSHOT STANDARD V3 output, box entry + SL/TP already drawn) — never a redrawn/fake chart
  <ENTRY_LOW>/<ENTRY_HIGH>, <SL>, <TP1>, <TP2>, <TP3 (optional)>
  <CONFIDENCE>      integer 0-100

If TP3 is present, change the 4-column grid to 5 columns (grid-template-columns: repeat(5,1fr)) and add a 5th tile. Never fabricate a TP3 that wasn't part of the actual setup.
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0b0b0c; font-family: 'Segoe UI', sans-serif; padding: 18px; max-width: 640px; margin: 0 auto; }
.card { background: #0b0b0c; border-radius: 8px; padding: 18px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.header-left { display: flex; align-items: center; gap: 10px; }
.logo { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.ticker { color: #f2f2f2; font-size: 20px; font-weight: 500; letter-spacing: 0.3px; }
.subtitle { color: #9a9a95; font-size: 12px; margin-top: 2px; }
.header-right { text-align: right; }
.dir-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; }
.session-tag { color: #6b6b66; font-size: 10px; margin-top: 4px; }
.chart-img { width: 100%; display: block; border-radius: 6px; background: #0b0b0c; }
.levels-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
.level-tile { background: #18181a; border-radius: 6px; padding: 8px 10px; text-align: center; }
.level-lbl { color: #7a7a75; font-size: 10px; text-transform: uppercase; }
.level-val { font-size: 13px; font-weight: 500; }
.val-neutral { color: #f2f2f2; }
.val-sl { color: #e24b4a; }
.val-tp { color: #63b370; }
.footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.confidence { color: #9a9a95; font-size: 11px; }
.disclaimer { color: #5a5a55; font-size: 10px; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-left">
      <img class="logo" src="data:image/jpeg;base64,<LOGO_BASE64>" alt="TRW">
      <div>
        <div class="ticker"><TICKER></div>
        <div class="subtitle"><SUBTITLE></div>
      </div>
    </div>
    <div class="header-right">
      <div class="dir-badge" style="background:<DIR_BG>;color:<DIR_TEXT>"><DIRECTION></div>
      <div class="session-tag"><SESSION_LABEL> · <DATE></div>
    </div>
  </div>

  <img class="chart-img" src="<CHART_IMG_PATH>" alt="<TICKER> setup">

  <div class="levels-grid">
    <div class="level-tile"><div class="level-lbl">Entry</div><div class="level-val val-neutral"><ENTRY_LOW>–<ENTRY_HIGH></div></div>
    <div class="level-tile"><div class="level-lbl">SL</div><div class="level-val val-sl"><SL></div></div>
    <div class="level-tile"><div class="level-lbl">TP1</div><div class="level-val val-tp"><TP1></div></div>
    <div class="level-tile"><div class="level-lbl">TP2</div><div class="level-val val-tp"><TP2></div></div>
    <!-- optional 5th tile if TP3 exists:
    <div class="level-tile"><div class="level-lbl">TP3</div><div class="level-val val-tp"><TP3></div></div>
    -->
  </div>

  <div class="footer">
    <span class="confidence">Confidence <CONFIDENCE>/100</span>
    <span class="disclaimer">Not financial advice</span>
  </div>
</div>
</body>
</html>
